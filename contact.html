<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – My mountain-hiking hobby</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, serif;
      background-color: #f5f5f0;
      color: #2c2c2c;
    }
    nav {
      background-color: #3a5a40;
      padding: 0 40px;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 0;
    }
    nav ul li a {
      display: block;
      padding: 16px 24px;
      color: #fff;
      text-decoration: none;
      font-family: Arial, sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.03em;
      transition: background 0.2s;
    }
    nav ul li a:hover, nav ul li a.active {
      background-color: #2c4430;
    }
    .has-dropdown { position: relative; }
    .dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: #3a5a40;
      list-style: none;
      min-width: 180px;
      z-index: 100;
    }
    .has-dropdown:hover .dropdown { display: block; }
    .dropdown li a { padding: 12px 24px; }
    main {
      max-width: 700px;
      margin: 60px auto;
      padding: 0 20px;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 400;
      color: #3a5a40;
      border-bottom: 2px solid #3a5a40;
      padding-bottom: 10px;
      margin-bottom: 24px;
      text-wrap: balance;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.8;
      color: #444;
      margin-bottom: 24px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    label {
      font-family: Arial, sans-serif;
      font-size: 0.85rem;
      color: #444;
      letter-spacing: 0.03em;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    input, textarea {
      font-family: Georgia, serif;
      font-size: 1rem;
      color: #2c2c2c;
      background-color: #fff;
      border: 1px solid #d0cfc8;
      padding: 10px 14px;
      border-radius: 0;
      outline: none;
      width: 100%;
    }
    input:focus, textarea:focus {
      border-color: #3a5a40;
    }
    textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.7;
    }
    button {
      align-self: flex-start;
      font-family: Arial, sans-serif;
      font-size: 0.9rem;
      font-weight: bold;
      letter-spacing: 0.03em;
      color: #fff;
      background-color: #3a5a40;
      border: none;
      padding: 12px 28px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background-color: #2c4430;
    }
  </style>
</head>
<body>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li class="has-dropdown">
        <a href="routes.html">Favourite Routes ▾</a>
        <ul class="dropdown">
          <li><a href="route-bright-angel-trail.html">Bright Angel Trail</a></li>
        </ul>
      </li>
      <li><a href="most-beautiful.html">My Most Beautiful Route</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>
  <main>
    <h1>Get in touch</h1>
    <p>
      Been on one of these trails? Found a better line? Just want to talk mountains? I am all ears. Drop me a message.
    </p>
    <form action="mailto:contact@test-pro.nl" method="post" enctype="text/plain">
      <label>
        Your name
        <input type="text" name="name" autocomplete="name">
      </label>
      <label>
        Your email
        <input type="email" name="email" autocomplete="email">
      </label>
      <label>
        Message
        <textarea name="message"></textarea>
      </label>
      <button type="submit">Send it</button>
    </form>
  </main>
</body>
</html>
